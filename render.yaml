services:
  - type: web
    name: greentech-hub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        value: https://greentech-hub-frontend.onrender.com,http://localhost:5173
      - key: TRUSTLESSWORK_API_BASE_URL
        value: https://dev.api.trustlesswork.com
      - key: TRUSTLESSWORK_API_KEY
        sync: false

  - type: web
    name: greentech-hub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://greentech-hub-backend.onrender.com/api
